# Economic assumptions for Lifecycle Cost Analysis (LCCA).
#
# IMPORTANT: none of the values below are real market prices — they are
# illustrative placeholders. Replace them with your own supplier quotes,
# local electricity tariffs, and organizational discount rate before using
# this for an actual capital-allocation decision. This tool computes the
# arithmetic only; it is not a substitute for financial/engineering advice.

# Installed pipe cost per metre, by diameter [m] -> cost per metre.
# Interpolated/clamped by src/economics/lcca.py::interpolate_cost_curve.
pipe_cost_curve:
  - [0.0127, 5.0]    # 1/2 inch
  - [0.0508, 12.0]   # 2 inch
  - [0.1016, 28.0]   # 4 inch

# Operating assumptions
operating_hours_per_year: 8760    # continuous operation; reduce for intermittent use
electricity_price_per_kWh: 0.15
years: 20
discount_rate: 0.07
opex_escalation_rate: 0.0         # annual electricity price growth, if any

# Optional flat additional pump/installation CAPEX (beyond pipe material),
# applied identically to every scenario unless overridden per-scenario.
pump_capex: 0.0
